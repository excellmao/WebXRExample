<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clean WebXR Room</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
    #app { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }

    /* Pretty Dropdown UI */
    #ui-panel {
      position: absolute; top: 20px; left: 20px; z-index: 10;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      padding: 15px; border-radius: 10px; color: white; border: 1px solid rgba(255,255,255,0.2);
    }
    #ui-panel select {
      background: #222; color: white; border: 1px solid #555; padding: 5px 10px; border-radius: 5px;
    }
  </style>
</head>
<body>
<div id="app"></div>

<div id="ui-panel">
  <label style="font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px;">CURRENT ENVIRONMENT:</label>
  <select id="model-select"></select>
  <div id="loading-text" style="font-size: 12px; color: #aaa; margin-top: 5px;"></div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
